<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>9MUG</title>
  </head>
  <body>
    <header id="topNav" class="top-nav">
      <div class="nav-left">
        <a href="#" class="nav-link">9pra</a>
        <div class="bag-group">
          <a href="#" class="nav-link nav-link-bag">bag</a>
          <span id="bagStatusText" class="bag-status" aria-live="polite">(1) $300</span>
        </div>
      </div>

      <div class="nav-right">
        <div class="audio-controls" aria-label="Audio controls">
          <img id="radioIcon" class="audio-icon" src="/media/radio-icon-play.png" alt="" />
          <div class="audio-toggle-group">
            <button id="radioBtn" class="control-btn" type="button">Radio</button>
            <button id="noiseBtn" class="control-btn is-muted" type="button">Noise</button>
          </div>
        </div>
        <div class="nav-status">
          <span class="nav-online">9 online</span>
          <img class="horse-icon" src="/media/online-icon-figma.png" alt="" />
        </div>
      </div>
    </header>

    <aside class="meta-left">
      <div class="meta-row">
        <span>9MUG</span>
        <div class="meta-switcher" id="metaSwitcher" aria-label="Switch mug design">
          <button id="metaSwitchFirst" class="meta-switch-btn is-active" type="button" aria-label="Mug design 1" aria-pressed="true">
            <span class="meta-switch-first-fill" aria-hidden="true">
              <span class="meta-switch-first-dot"></span>
            </span>
          </button>
          <button id="metaSwitchSecond" class="meta-switch-btn" type="button" aria-label="Mug design 2" aria-pressed="false">
            <span class="meta-switch-fill"></span>
          </button>
        </div>
      </div>
      <div id="priceToggle" class="meta-row meta-row-price price-toggle" role="button" tabindex="0" aria-pressed="false">
        <img id="priceToggleIcon" class="price-plus-icon" src="/media/price-plus.svg" alt="" />
        <span>$300</span>
      </div>
    </aside>

    <div class="bottom-links" aria-label="Additional links">
      <a href="#" class="bottom-link bottom-link-details">Details</a>
      <a href="#" class="bottom-link bottom-link-support">Support</a>
    </div>

    <main id="smoothRoot">
      <section class="panel panel-hero contrast-target" data-contrast-type="media">
        <img id="heroDesktopImage" class="panel-media desktop-only" src="/media/hero-desktop.png" alt="" />
        <img id="heroMobileImage" class="panel-media mobile-only" src="/media/hero-mobile.png" alt="" />
        <div class="mug-switcher" id="mugSwitcher" aria-label="Switch mug design">
          <button
            class="mug-switcher-btn is-active"
            type="button"
            data-slide-index="0"
            data-desktop-src="/media/hero-desktop.png"
            data-mobile-src="/media/hero-mobile.png"
            aria-label="Mug design 1"
            aria-pressed="true"
          >
            <img src="/media/mug/33-1.png" alt="" />
          </button>
          <button
            class="mug-switcher-btn"
            type="button"
            data-slide-index="1"
            data-desktop-src="/media/hero-switch-2.png"
            data-mobile-src="/media/hero-switch-2.png"
            aria-label="Mug design 2"
            aria-pressed="false"
          >
            <img src="/media/mug/33-2.png" alt="" />
          </button>
          <button
            class="mug-switcher-btn"
            type="button"
            data-slide-index="2"
            data-desktop-src="/media/hero-switch-4.png"
            data-mobile-src="/media/hero-switch-4.png"
            aria-label="Mug design 3"
            aria-pressed="false"
          >
            <img src="/media/hero-switch-4.png" alt="" />
          </button>
          <button
            class="mug-switcher-btn"
            type="button"
            data-slide-index="3"
            data-desktop-src="/media/hero-switch-5.png"
            data-mobile-src="/media/hero-switch-5.png"
            aria-label="Mug design 4"
            aria-pressed="false"
          >
            <img src="/media/hero-switch-5.png" alt="" />
          </button>
        </div>
        <div class="scroll-indicator" aria-hidden="true">
          <span class="line left"></span>
          <span class="line right"></span>
        </div>
      </section>

      <section class="panel contrast-target" data-contrast-type="video">
        <video
          id="sectionVideo"
          class="panel-video desktop-only"
          muted
          playsinline
          preload="auto"
        ></video>
        <video
          id="sectionVideoMobile"
          class="panel-video mobile-only"
          muted
          playsinline
          preload="auto"
        ></video>
      </section>

      <section class="image-grid-section contrast-target" data-contrast-type="media">
        <div class="image-grid-row image-grid-row-two">
          <img class="image-grid-item" src="/media/grid-top-left.jpg" alt="" loading="lazy" decoding="async" />
          <img class="image-grid-item" src="/media/grid-top-right.jpg" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="image-grid-row image-grid-row-full">
          <img class="image-grid-item" src="/media/grid-middle.jpg" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="image-grid-row image-grid-row-two">
          <img class="image-grid-item" src="/media/grid-bottom-left.jpg" alt="" loading="lazy" decoding="async" />
          <img class="image-grid-item" src="/media/grid-bottom-right.jpg" alt="" loading="lazy" decoding="async" />
        </div>
      </section>

      <section id="scrollVideoSection" class="scroll-video-section contrast-target" data-contrast-type="video">
        <div class="scroll-video-sticky">
          <video
            id="scrollVideo"
            class="panel-video desktop-only"
            src="/media/scroll-video.mp4"
            muted
            playsinline
            preload="auto"
          ></video>
          <video
            id="scrollVideoMobile"
            class="panel-video mobile-only"
            src="/media/scroll-video.mp4"
            muted
            playsinline
            preload="auto"
          ></video>
        </div>
      </section>

    </main>

    <audio id="radioPlayer" preload="metadata"></audio>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
