<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>9PRA</title>
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-left">
        <a href="./index.html" class="nav-link">9pra</a>
        <div class="bag-group">
          <a href="#" class="nav-link nav-link-bag">bag</a>
        </div>
      </div>

      <div class="nav-mobile-center">
        <img src="/media/home/radio-indicator-mobile.svg" alt="" />
      </div>

      <div class="nav-right">
        <div class="audio-controls" aria-label="Audio controls">
          <img id="radioIcon" class="audio-icon" src="/media/radio-icon-play.png" alt="" />
          <div class="audio-toggle-group">
            <button id="radioBtn" class="control-btn" type="button">Radio</button>
            <button id="noiseBtn" class="control-btn is-muted" type="button">Noise</button>
          </div>
        </div>
        <div class="nav-status">
          <span class="nav-online">8 online</span>
          <img class="horse-icon" src="/media/home/online-icon.png" alt="" />
        </div>
      </div>
    </header>

    <aside class="meta-left desktop-only">
      <div class="meta-item">9MUG</div>
      <div class="meta-item is-muted">Texture Pack</div>
      <div class="meta-item is-muted">Cutting Mat</div>
    </aside>

    <main class="home-main">
      <section class="home-panel home-panel-hero">
        <a class="hero-panel-link" href="./product.html" aria-label="Open product page"></a>
        <picture class="home-media">
          <source media="(max-width: 900px)" srcset="/media/home/hero-mobile.png" />
          <img src="/media/home/hero-desktop.png" alt="" />
        </picture>
        <p class="mobile-panel-title">9MUG</p>
      </section>

      <section class="home-panel home-panel-frame">
        <picture class="home-media">
          <source media="(max-width: 900px)" srcset="/media/home/frame-mobile.png" />
          <img src="/media/home/frame-desktop.png" alt="" />
        </picture>
        <p class="mobile-panel-title">Texture Pack</p>
      </section>

      <section class="home-panel home-panel-mat">
        <picture class="home-media">
          <source media="(max-width: 900px)" srcset="/media/home/mat-mobile.png" />
          <img src="/media/home/mat-desktop.png" alt="" />
        </picture>
        <p class="mobile-panel-title is-light">Cutting Mat</p>
      </section>
    </main>

    <audio id="radioPlayer" preload="metadata"></audio>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
