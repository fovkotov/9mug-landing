<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>9PRA</title>
  </head>
  <body class="page-home">
    <header class="top-nav">
      <div class="nav-left">
        <a href="./index.html" class="nav-link">9PRA</a>
        <div class="bag-group">
          <a href="#" class="nav-link nav-link-bag">bag</a>
        </div>
      </div>

      <div class="nav-mobile-center" aria-hidden="true">
        <img src="/media/menu-mobile.svg" alt="" />
      </div>

      <div class="nav-right">
        <div class="audio-controls" aria-label="Audio controls">
          <img id="radioIcon" class="audio-icon" src="/media/radio-icon-play.png" alt="" />
          <div class="audio-toggle-group">
            <button id="radioBtn" class="control-btn" type="button">Radio</button>
            <button id="noiseBtn" class="control-btn is-muted" type="button">Noise</button>
          </div>
        </div>
        <a class="nav-status" href="./shop.html" aria-label="Open shop">
          <span class="nav-online">8 online</span>
          <img class="horse-icon" src="/media/home/online-icon.png" alt="" />
        </a>
      </div>
    </header>

    <aside class="meta-left desktop-only" aria-hidden="true">
      <span class="meta-item is-active">9MUG</span>
    </aside>

    <main class="home-main">
      <section class="home-panel home-panel-video">
        <a class="hero-panel-link" href="./product.html" aria-label="Open product page"></a>
        <a class="home-mobile-title mobile-only" href="./product.html">9MUG</a>
        <video
          id="homeVideo"
          class="panel-video desktop-only"
          src="./media/home/hero-video.mp4"
          muted
          playsinline
          loop
          autoplay
          preload="auto"
        ></video>
        <video
          id="homeVideoMobile"
          class="panel-video mobile-only"
          src="./media/home/hero-video.mp4"
          muted
          playsinline
          loop
          autoplay
          preload="auto"
        ></video>
        <div class="home-video-dim" aria-hidden="true"></div>
      </section>
    </main>

    <audio id="radioPlayer" preload="metadata"></audio>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
