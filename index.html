<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9MUG</title>
  </head>
  <body>
    <header id="topNav" class="top-nav is-dark">
      <div class="nav-left">
        <a href="#" class="nav-link">9pra</a>
        <a href="#" class="nav-link">bag</a>
      </div>

      <div class="nav-right">
        <div class="audio-controls" aria-label="Audio controls">
          <span class="audio-icon" aria-hidden="true"></span>
          <div class="audio-toggle-group">
            <button id="radioBtn" class="control-btn" type="button">Radio</button>
            <button id="noiseBtn" class="control-btn is-muted" type="button">Noise</button>
          </div>
        </div>
        <div class="nav-status">
          <span class="nav-online">9 online</span>
          <img class="horse-icon" src="/media/horse.png" alt="" />
        </div>
      </div>
    </header>

    <aside class="meta-left">
      <div class="meta-row">
        <span>9MUG</span>
        <span class="meta-dot is-hollow"></span>
        <span class="meta-dot is-filled"></span>
      </div>
      <div class="meta-row">
        <img class="price-plus-icon" src="/media/price-plus.png" alt="" />
        <span>$300</span>
      </div>
    </aside>

    <main id="smoothRoot">
      <section class="panel panel-hero contrast-target" data-contrast-type="media">
        <img id="heroDesktopImage" class="panel-media desktop-only" src="/media/hero-desktop.png" alt="" />
        <img id="heroMobileImage" class="panel-media mobile-only" src="/media/hero-mobile.png" alt="" />
        <div class="mug-switcher" id="mugSwitcher" aria-label="Switch mug design">
          <button
            class="mug-switcher-btn is-active"
            type="button"
            data-slide-index="0"
            data-desktop-src="/media/hero-desktop.png"
            data-mobile-src="/media/hero-mobile.png"
            aria-label="Mug design 1"
            aria-pressed="true"
          >
            <img src="/media/mug/33-1.png" alt="" />
          </button>
          <button
            class="mug-switcher-btn"
            type="button"
            data-slide-index="1"
            data-desktop-src="/media/section-2-desktop.png"
            data-mobile-src="/media/section-2-mobile.png"
            aria-label="Mug design 2"
            aria-pressed="false"
          >
            <img src="/media/mug/33-2.png" alt="" />
          </button>
        </div>
        <div class="scroll-indicator" aria-hidden="true">
          <span class="line left"></span>
          <span class="line right"></span>
        </div>
      </section>

      <section class="panel contrast-target" data-contrast-type="media">
        <img class="panel-media desktop-only" src="/media/section-2-desktop.png" alt="" />
        <img class="panel-media mobile-only" src="/media/section-2-mobile.png" alt="" />
      </section>

      <section id="scrollVideoSection" class="scroll-video-section contrast-target" data-contrast-type="video">
        <div class="scroll-video-sticky">
          <video
            id="scrollVideo"
            class="panel-video desktop-only"
            src="/media/scroll-video.mp4"
            muted
            playsinline
            preload="auto"
          ></video>
          <video
            id="scrollVideoMobile"
            class="panel-video mobile-only"
            src="/media/scroll-video.mp4"
            muted
            playsinline
            preload="auto"
          ></video>
        </div>
      </section>

    </main>

    <audio id="radioPlayer" preload="metadata"></audio>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
